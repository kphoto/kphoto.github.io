# Yarn 4 configuration — see docs/adr/0014-yarn-and-dependency-policy.md
nodeLinker: node-modules
enableGlobalCache: true

# Supply-chain quarantine (ADR 0014): refuse versions published more recently
# than 4320 minutes (72 hours). "Latest" means latest past this gate.
npmMinimalAgeGate: 4320

# typescript-eslint (and its dependency ts-api-utils) still require TypeScript's
# classic JS API, which typescript@7 no longer ships. These extensions give that
# tool realm a nested typescript@6.0.3 while the project itself compiles with the
# native typescript@7. The `typescript-eslint` meta package and
# `@typescript-eslint/utils` carry the same fallback so their `typescript` peer
# edge is satisfied without a workspace-level typescript (which would collide
# with the native compiler's `tsc` bin). See docs/adr/0006-dual-typescript-toolchain.md
packageExtensions:
  'typescript-eslint@*':
    dependencies:
      typescript: '6.0.3'
  '@typescript-eslint/eslint-plugin@*':
    dependencies:
      typescript: '6.0.3'
  '@typescript-eslint/parser@*':
    dependencies:
      typescript: '6.0.3'
  '@typescript-eslint/project-service@*':
    dependencies:
      typescript: '6.0.3'
  '@typescript-eslint/type-utils@*':
    dependencies:
      typescript: '6.0.3'
  '@typescript-eslint/typescript-estree@*':
    dependencies:
      typescript: '6.0.3'
  '@typescript-eslint/utils@*':
    dependencies:
      typescript: '6.0.3'
  'ts-api-utils@*':
    dependencies:
      typescript: '6.0.3'
