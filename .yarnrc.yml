# Yarn 4 configuration — see docs/adr/0014-yarn-4-via-corepack.md
nodeLinker: node-modules
enableGlobalCache: true

# typescript-eslint (and its dependency ts-api-utils) still require TypeScript's
# classic JS API, which typescript@7 no longer ships. These extensions give that
# tool realm a nested typescript@6.0.3 while the project itself compiles with the
# native typescript@7. See docs/adr/0006-linting-with-typescript-eslint.md
packageExtensions:
  '@typescript-eslint/eslint-plugin@*':
    dependencies:
      typescript: '6.0.3'
  '@typescript-eslint/parser@*':
    dependencies:
      typescript: '6.0.3'
  '@typescript-eslint/project-service@*':
    dependencies:
      typescript: '6.0.3'
  '@typescript-eslint/type-utils@*':
    dependencies:
      typescript: '6.0.3'
  '@typescript-eslint/typescript-estree@*':
    dependencies:
      typescript: '6.0.3'
  'ts-api-utils@*':
    dependencies:
      typescript: '6.0.3'
