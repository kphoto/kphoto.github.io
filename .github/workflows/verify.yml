# Reusable verification suite. Deliberately slim: every step just calls a
# script from scripts/, so CI runs exactly what ./check.sh runs locally.
name: verify

on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Enable corepack (yarn)
        run: corepack enable

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Bootstrap
        run: ./scripts/bootstrap.sh

      - name: Format check
        run: ./scripts/format.sh --check

      - name: Lint
        run: ./scripts/lint.sh

      - name: Typecheck (TypeScript 7 native compiler)
        run: ./scripts/typecheck.sh

      - name: Unit tests
        run: ./scripts/test-unit.sh

      - name: Build
        run: ./scripts/build.sh

      - name: End-to-end tests
        run: ./scripts/test-e2e.sh
