# Every push to main: run the full verification suite, then build and deploy
# the static site to GitHub Pages. Steps only call scripts from scripts/.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/verify.yml

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Enable corepack (yarn)
        run: corepack enable

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Bootstrap
        run: ./scripts/bootstrap.sh

      - name: Build
        run: ./scripts/build.sh

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
